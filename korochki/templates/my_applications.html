<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заявки - Корочки.есть</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">
                    <i class="fas fa-graduation-cap"></i> Корочки.<span>есть</span>
                </a>
                <nav class="nav-menu">
                    <a href="/my-applications" class="active"><i class="fas fa-list"></i> Мои заявки</a>
                    <a href="/new-application"><i class="fas fa-plus-circle"></i> Новая заявка</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выход</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="card mt-4">
                <h1 class="mb-4"><i class="fas fa-list"></i> Мои заявки на обучение</h1>

                <div id="alert"></div>

                <div id="applicationsContainer">
                    <p style="text-align: center; color: #666;">Загрузка заявок...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Портал "Корочки.есть". Все права защищены.</p>
        </div>
    </footer>

    <script src="/static/js/notifications.js"></script>
    <script>
        let applications = [];

        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login';
                return;
            }
            await loadApplications(token);
        });

        async function loadApplications(token) {
            try {
                const response = await fetch('/api/applications', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    applications = await response.json();
                    checkAdmin(token);
                    renderApplications();
                } else {
                    showAlert('Ошибка загрузки заявок', 'error');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        async function checkAdmin(token) {
            try {
                const response = await fetch('/api/admin/applications', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    const navMenu = document.querySelector('.nav-menu');
                    const adminLink = document.createElement('a');
                    adminLink.href = '/admin/dashboard';
                    adminLink.innerHTML = '<i class="fas fa-cog"></i> Админ панель';
                    navMenu.insertBefore(adminLink, navMenu.lastElementChild);
                }
            } catch (error) {
            }
        }

        function renderApplications() {
            const container = document.getElementById('applicationsContainer');

            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="text-center" style="padding: 40px;">
                        <p style="color: #666; margin-bottom: 20px; font-size: 18px;">
                            У вас пока нет ни одной заявки на обучение
                        </p>
                        <a href="/new-application" class="btn btn-primary">
                            <i class="fas fa-plus-circle"></i> Создать первую заявку
                        </a>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Курс</th>
                                <th>Дата начала</th>
                                <th>Способ оплаты</th>
                                <th>Статус</th>
                                <th>Дата подачи</th>
                                <th>Отзыв</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            applications.forEach(app => {
                const statusClass = getStatusClass(app.status);
                const dateCreated = new Date(app.created_at).toLocaleDateString('ru-RU', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const startDate = new Date(app.desired_start_date).toLocaleDateString('ru-RU');

                html += `
                    <tr>
                        <td>#${app.id}</td>
                        <td>${escapeHtml(app.course_name)}</td>
                        <td>${startDate}</td>
                        <td>${app.payment_method_id}</td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                ${escapeHtml(app.status)}
                            </span>
                        </td>
                        <td>${dateCreated}</td>
                        <td class="review-text">
                            ${app.review ? escapeHtml(app.review) : '-'}
                        </td>
                        <td>
                            ${app.status === 'Обучение завершено' && !app.review ? `
                                <button class="btn btn-success btn-sm" onclick="showReviewForm(${app.id})">
                                    <i class="fas fa-comment"></i> Оставить отзыв
                                </button>
                                <div id="review-form-${app.id}" class="hidden" style="margin-top: 10px;">
                                    <div class="d-flex gap-2">
                                        <input type="text" id="review-input-${app.id}" 
                                               class="form-control" 
                                               placeholder="Ваш отзыв..." 
                                               maxlength="500">
                                        <button class="btn btn-success btn-sm" onclick="submitReview(${app.id})">
                                            <i class="fas fa-paper-plane"></i>
                                        </button>
                                        <button class="btn btn-danger btn-sm" onclick="hideReviewForm(${app.id})">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                </div>
                            ` : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteApplication(${app.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function getStatusClass(status) {
            switch (status) {
                case 'Новая': return 'status-new';
                case 'Идет обучение': return 'status-progress';
                case 'Обучение завершено': return 'status-completed';
                default: return '';
            }
        }

        function showReviewForm(id) {
            document.getElementById(`review-form-${id}`).classList.remove('hidden');
        }

        function hideReviewForm(id) {
            document.getElementById(`review-form-${id}`).classList.add('hidden');
        }

        async function submitReview(id) {
            const reviewInput = document.getElementById(`review-input-${id}`);
            const review = reviewInput.value.trim();

            if (!review) {
                showAlert('Отзыв не может быть пустым', 'error');
                return;
            }

            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch(`/api/applications/${id}/review`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ review })
                });

                if (response.ok) {
                    showAlert('Спасибо! Ваш отзыв сохранен.', 'success');
                    await loadApplications(token);
                } else {
                    const data = await response.json();
                    showAlert(data.detail || 'Ошибка при отправке отзыва', 'error');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        async function deleteApplication(id) {
            if (!confirm('Вы уверены, что хотите удалить эту заявку?')) return;

            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch(`/api/applications/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok || response.status === 204) {
                    showAlert('Заявка удалена', 'success');
                    await loadApplications(token);
                } else {
                    const data = await response.json();
                    showAlert(data.detail || 'Ошибка при удалении заявки', 'error');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        function showAlert(message, type) {
            if (window.notifications) {
                window.notifications[type](message);
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
