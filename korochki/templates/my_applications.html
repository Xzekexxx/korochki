<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заявки - Корочки.есть</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .nav {
            display: flex;
            gap: 20px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .nav a:hover {
            background-color: #4CAF50;
        }
        .nav a.active {
            background-color: #4CAF50;
        }
        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            border: 1px solid #c3e6cb;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            border: 1px solid #f5c6cb;
        }
        .applications-table {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }
        .status-new {
            background-color: #ffc107;
            color: #333;
        }
        .status-in-progress {
            background-color: #17a2b8;
            color: white;
        }
        .status-completed {
            background-color: #28a745;
            color: white;
        }
        .review-text {
            max-width: 200px;
            font-size: 13px;
            color: #555;
            font-style: italic;
        }
        .btn-review {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.3s;
        }
        .btn-review:hover {
            background-color: #218838;
        }
        .btn-review:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .review-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .review-input {
            flex: 1;
            min-width: 150px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
        }
        .no-applications {
            text-align: center;
            padding: 40px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .no-applications p {
            color: #666;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .btn-create {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-create:hover {
            background-color: #45a049;
        }
        .admin-link {
            margin-bottom: 20px;
        }
        .admin-link a {
            background-color: #dc3545;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .admin-link a:hover {
            background-color: #c82333;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.3s;
        }
        .btn-delete:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">Корочки.есть</div>
            <div class="nav">
                <a href="/my-applications" class="active">Мои заявки</a>
                <a href="/new-application">Новая заявка</a>
                <a href="#" onclick="logout()">Выход</a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="adminLinkContainer"></div>
        
        <h1>Мои заявки на обучение</h1>
        
        <div id="alert"></div>
        
        <div id="applicationsContainer">
            <p style="text-align: center; color: #666;">Загрузка заявок...</p>
        </div>
    </div>

    <script>
        let applications = [];

        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            await loadApplications(token);
        });

        async function loadApplications(token) {
            try {
                const response = await fetch('/api/applications', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    applications = await response.json();
                    
                    checkAdmin(token);
                    
                    renderApplications();
                } else {
                    showAlert('Ошибка загрузки заявок', 'error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        async function checkAdmin(token) {
            try {
                const response = await fetch('/api/admin/applications', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {

                    document.getElementById('adminLinkContainer').innerHTML = `
                        <div class="admin-link">
                            <a href="/admin/dashboard">Перейти в панель администратора ></a>
                        </div>
                    `;
                }
            } catch (error) {

            }
        }

        function renderApplications() {
            const container = document.getElementById('applicationsContainer');

            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="no-applications">
                        <p>У вас пока нет ни одной заявки на обучение</p>
                        <a href="/new-application" class="btn-create">Создайте первую заявку</a>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="applications-table">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Курс</th>
                                <th>Дата начала</th>
                                <th>Способ оплаты</th>
                                <th>Статус</th>
                                <th>Дата подачи</th>
                                <th>Отзыв</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            applications.forEach(app => {
                const statusClass = getStatusClass(app.status);
                const dateCreated = new Date(app.created_at).toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const startDate = new Date(app.desired_start_date).toLocaleDateString('ru-RU');

                html += `
                    <tr>
                        <td>#${app.id}</td>
                        <td>${escapeHtml(app.course_name)}</td>
                        <td>${startDate}</td>
                        <td>${app.payment_method_id}</td>
                        <td>
                            <span class="status ${statusClass}">
                                ${escapeHtml(app.status)}
                            </span>
                        </td>
                        <td>${dateCreated}</td>
                        <td class="review-text">
                            ${app.review ? escapeHtml(app.review) : '-'}
                        </td>
                        <td>
                            ${app.status === 'Обучение завершено' && !app.review ? `
                                <button class="btn-review" onclick="showReviewForm(${app.id})">
                                    Оставить отзыв
                                </button>
                                <div id="review-form-${app.id}" style="display: none; margin-top: 10px;">
                                    <div class="review-form">
                                        <input type="text" id="review-input-${app.id}" 
                                               class="review-input" 
                                               placeholder="Ваш отзыв..." 
                                               maxlength="500"
                                               required>
                                        <button class="btn-review" onclick="submitReview(${app.id})">
                                            Отправить
                                        </button>
                                        <button class="btn-review" 
                                                style="background-color: #6c757d;" 
                                                onclick="hideReviewForm(${app.id})">
                                            Отмена
                                        </button>
                                    </div>
                                </div>
                            ` : ''}
                            <button class="btn-delete" onclick="deleteApplication(${app.id})">
                                Удалить
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function getStatusClass(status) {
            switch (status) {
                case 'Новая': return 'status-new';
                case 'Идет обучение': return 'status-in-progress';
                case 'Обучение завершено': return 'status-completed';
                default: return '';
            }
        }

        function showReviewForm(id) {
            document.getElementById(`review-form-${id}`).style.display = 'block';
        }

        function hideReviewForm(id) {
            document.getElementById(`review-form-${id}`).style.display = 'none';
        }

        async function submitReview(id) {
            const reviewInput = document.getElementById(`review-input-${id}`);
            const review = reviewInput.value.trim();

            if (!review) {
                showAlert('Отзыв не может быть пустым', 'error');
                return;
            }

            if (review.length > 500) {
                showAlert('Отзыв не может быть длиннее 500 символов', 'error');
                return;
            }

            const token = localStorage.getItem('access_token');

            try {
                const response = await fetch(`/api/applications/${id}/review`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ review })
                });

                if (response.ok) {
                    showAlert('Спасибо! Ваш отзыв сохранен.', 'success');
                    await loadApplications(token);
                } else {
                    const data = await response.json();
                    showAlert(data.detail || 'Ошибка при отправке отзыва', 'error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        async function deleteApplication(id) {
            if (!confirm('Вы уверены, что хотите удалить эту заявку?')) {
                return;
            }

            const token = localStorage.getItem('access_token');

            try {
                const response = await fetch(`/api/applications/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok || response.status === 204) {
                    showAlert('Заявка удалена', 'success');
                    await loadApplications(token);
                } else {
                    const data = await response.json();
                    showAlert(data.detail || 'Ошибка при удалении заявки', 'error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = type === 'success' ? 'success-message' : 'error-message';
            alert.textContent = message;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
