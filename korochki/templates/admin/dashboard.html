<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Корочки.есть</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header" style="background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">
                    <i class="fas fa-graduation-cap"></i> Корочки.<span>есть</span> <span style="color: #ffd700;">(Админ)</span>
                </a>
                <nav class="nav-menu">
                    <a href="/my-applications"><i class="fas fa-list"></i> Мои заявки</a>
                    <a href="/new-application"><i class="fas fa-plus-circle"></i> Новая заявка</a>
                    <a href="/admin/dashboard" class="active"><i class="fas fa-cog"></i> Админ-панель</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выход</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="card mt-4">
                <h1 class="mb-4"><i class="fas fa-tachometer-alt"></i> Панель администратора</h1>

                <div id="alert"></div>

                <div class="stats" id="statsContainer">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Всего заявок</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statNew">0</div>
                        <div class="stat-label">Новых</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statInProgress">0</div>
                        <div class="stat-label">В процессе</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statCompleted">0</div>
                        <div class="stat-label">Завершено</div>
                    </div>
                </div>

                <div class="filters">
                    <div class="filter-group">
                        <label for="status-filter"><i class="fas fa-filter"></i> Фильтр по статусу</label>
                        <select id="status-filter" onchange="filterByStatus(this.value)">
                            <option value="all">Все статусы</option>
                            <option value="Новая">Новые</option>
                            <option value="Идет обучение">В процессе</option>
                            <option value="Обучение завершено">Завершенные</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="search"><i class="fas fa-search"></i> Поиск по ФИО или курсу</label>
                        <input type="text" id="search" placeholder="Введите текст для поиска..." onkeyup="searchTable(this.value)">
                    </div>
                    <button class="btn-filter" onclick="resetFilters()">
                        <i class="fas fa-undo"></i> Сбросить
                    </button>
                </div>

                <div id="applicationsContainer">
                    <p style="text-align: center; color: #666;">Загрузка заявок...</p>
                </div>

                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Портал "Корочки.есть". Все права защищены.</p>
        </div>
    </footer>

    <script src="/static/js/notifications.js"></script>
    <script>
        let applications = [];
        let filteredApplications = [];
        let currentPage = 1;
        const rowsPerPage = 10;

        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login';
                return;
            }
            await loadApplications(token);
        });

        async function loadApplications(token) {
            try {
                const response = await fetch('/api/admin/applications', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 403) {
                    showAlert('Доступ запрещён. Требуется роль администратора.', 'error');
                    setTimeout(() => {
                        window.location.href = '/my-applications';
                    }, 2000);
                    return;
                }

                if (response.ok) {
                    applications = await response.json();
                    filteredApplications = [...applications];
                    updateStats();
                    renderApplications();
                    setupPagination();
                } else {
                    showAlert('Ошибка загрузки заявок', 'error');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        function updateStats() {
            const total = applications.length;
            const newCount = applications.filter(app => app.status === 'Новая').length;
            const inProgress = applications.filter(app => app.status === 'Идет обучение').length;
            const completed = applications.filter(app => app.status === 'Обучение завершено').length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statNew').textContent = newCount;
            document.getElementById('statInProgress').textContent = inProgress;
            document.getElementById('statCompleted').textContent = completed;
        }

        function renderApplications() {
            const container = document.getElementById('applicationsContainer');

            if (filteredApplications.length === 0) {
                container.innerHTML = `
                    <div class="text-center" style="padding: 40px;">
                        <p style="color: #666;">В системе пока нет ни одной заявки</p>
                    </div>
                `;
                return;
            }

            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredApplications.slice(start, end);

            let html = `
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Пользователь</th>
                                <th>Курс</th>
                                <th>Дата начала</th>
                                <th>Способ оплаты</th>
                                <th>Статус</th>
                                <th>Дата подачи</th>
                                <th>Отзыв</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            pageData.forEach(app => {
                const statusClass = getStatusClass(app.status);
                const dateCreated = new Date(app.created_at).toLocaleDateString('ru-RU', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const startDate = new Date(app.desired_start_date).toLocaleDateString('ru-RU');

                html += `
                    <tr data-status="${escapeHtml(app.status)}">
                        <td>#${app.id}</td>
                        <td>
                            <strong>${escapeHtml(app.user_full_name || app.user_name)}</strong><br>
                            <small style="color: #666;">${escapeHtml(app.user_login || '')}</small><br>
                            <small style="color: #666;">${escapeHtml(app.user_email || '')}</small>
                        </td>
                        <td>${escapeHtml(app.course_name)}</td>
                        <td>${startDate}</td>
                        <td>${app.payment_method_name || app.payment_method_id}</td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                ${escapeHtml(app.status)}
                            </span>
                        </td>
                        <td>${dateCreated}</td>
                        <td>${app.review ? '<i class="fas fa-comment" title="' + escapeHtml(app.review) + '"></i>' : '-'}</td>
                        <td>
                            <form class="d-flex gap-2" onsubmit="updateStatus(event, ${app.id})">
                                <select name="status" class="form-control" style="width: 180px; padding: 8px;">
                                    <option value="Новая" ${app.status === 'Новая' ? 'selected' : ''}>Новая</option>
                                    <option value="Идет обучение" ${app.status === 'Идет обучение' ? 'selected' : ''}>Идет обучение</option>
                                    <option value="Обучение завершено" ${app.status === 'Обучение завершено' ? 'selected' : ''}>Обучение завершено</option>
                                </select>
                                <button type="submit" class="btn btn-success btn-sm">
                                    <i class="fas fa-save"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function getStatusClass(status) {
            switch (status) {
                case 'Новая': return 'status-new';
                case 'Идет обучение': return 'status-progress';
                case 'Обучение завершено': return 'status-completed';
                default: return '';
            }
        }

        function setupPagination() {
            const pagination = document.getElementById('pagination');
            const pageCount = Math.ceil(filteredApplications.length / rowsPerPage);
            
            if (pageCount <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= pageCount; i++) {
                html += `<a href="#" onclick="goToPage(${i}); return false;" class="${i === currentPage ? 'active' : ''}">${i}</a>`;
            }
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderApplications();
            setupPagination();
        }

        function filterByStatus(status) {
            if (status === 'all') {
                filteredApplications = [...applications];
            } else {
                filteredApplications = applications.filter(app => app.status === status);
            }
            currentPage = 1;
            renderApplications();
            setupPagination();
        }

        function searchTable(searchText) {
            searchText = searchText.toLowerCase().trim();
            filteredApplications = applications.filter(app => {
                const userName = (app.user_full_name || '').toLowerCase();
                const courseName = (app.course_name || '').toLowerCase();
                return userName.includes(searchText) || courseName.includes(searchText);
            });
            currentPage = 1;
            renderApplications();
            setupPagination();
        }

        function resetFilters() {
            document.getElementById('status-filter').value = 'all';
            document.getElementById('search').value = '';
            filteredApplications = [...applications];
            currentPage = 1;
            renderApplications();
            setupPagination();
        }

        async function updateStatus(event, appId) {
            event.preventDefault();
            const form = event.target;
            const status = form.querySelector('select').value;
            const token = localStorage.getItem('access_token');

            try {
                const response = await fetch(`/api/admin/applications/${appId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    showAlert(`Статус заявки #${appId} успешно изменен на "${status}"`, 'success');
                    await loadApplications(token);
                } else {
                    const data = await response.json();
                    showAlert(data.detail || 'Ошибка при обновлении статуса', 'error');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу', 'error');
            }
        }

        function showAlert(message, type) {
            if (window.notifications) {
                window.notifications[type](message);
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
