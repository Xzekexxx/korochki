<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Корочки.есть</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .auth-header p {
            color: #666;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1><i class="fas fa-sign-in-alt"></i> Вход в систему</h1>
            <p>Введите свои данные для входа</p>
        </div>

        <div id="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Логин</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       class="form-control"
                       required 
                       placeholder="Введите ваш логин">
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       class="form-control"
                       required 
                       placeholder="Введите ваш пароль">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>

        <div class="auth-footer">
            <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
            <p><a href="/">← Вернуться на главную</a></p>
        </div>
    </div>

    <script src="/static/js/notifications.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                window.notifications.error('Введите логин и пароль');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.notifications.error('Неверный логин или пароль');
                    } else if (response.status === 404) {
                        window.notifications.error('Пользователь не найден');
                    } else {
                        const data = await response.json().catch(() => ({}));
                        window.notifications.error(data.detail || 'Ошибка входа');
                    }
                    return;
                }

                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                window.notifications.success('Вход успешен! Перенаправление...');
                setTimeout(() => {
                    window.location.href = '/my-applications';
                }, 1000);

            } catch (error) {
                console.error('Ошибка:', error);
                window.notifications.error('Ошибка подключения к серверу. Проверьте интернет-соединение.');
            }
        });

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
