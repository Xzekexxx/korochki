<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка - Корочки.есть</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">
                    <i class="fas fa-graduation-cap"></i> Корочки.<span>есть</span>
                </a>
                <nav class="nav-menu">
                    <a href="/my-applications"><i class="fas fa-list"></i> Мои заявки</a>
                    <a href="/new-application" class="active"><i class="fas fa-plus-circle"></i> Новая заявка</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выход</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="card mt-4" style="max-width: 800px; margin-left: auto; margin-right: auto;">
                <h1 class="text-center mb-4"><i class="fas fa-file-alt"></i> Создание новой заявки</h1>

                <div id="alert"></div>

                <form id="applicationForm">
                    <div class="form-group">
                        <label for="course_name"><i class="fas fa-book"></i> Наименование курса *</label>
                        <input type="text" 
                               id="course_name" 
                               name="course_name" 
                               class="form-control"
                               required
                               minlength="1"
                               maxlength="200"
                               placeholder="Введите название курса">
                    </div>

                    <div class="form-group">
                        <label for="desired_start_date"><i class="fas fa-calendar-alt"></i> Желаемая дата начала *</label>
                        <input type="date" 
                               id="desired_start_date" 
                               name="desired_start_date" 
                               class="form-control"
                               required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-credit-card"></i> Способ оплаты *</label>
                        <div id="paymentMethodsContainer" style="padding: 15px; background: #f8f9fa; border-radius: 10px;">
                            <p style="color: #666;">Загрузка способов оплаты...</p>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane"></i> Отправить заявку
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="/my-applications" class="btn btn-success">
                        <i class="fas fa-arrow-left"></i> Вернуться к списку заявок
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Портал "Корочки.есть". Все права защищены.</p>
        </div>
    </footer>

    <script src="/static/js/notifications.js"></script>
    <script>
        let paymentMethods = [];

        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            await loadPaymentMethods(token);

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('desired_start_date').setAttribute('min', today);
        });

        async function loadPaymentMethods(token) {
            try {
                const response = await fetch('/api/payment-methods');
                if (response.ok) {
                    paymentMethods = await response.json();
                    renderPaymentMethods();
                } else {
                    document.getElementById('paymentMethodsContainer').innerHTML = `
                        <p style="color: #dc3545;">Ошибка загрузки способов оплаты</p>
                    `;
                }
            } catch (error) {
                document.getElementById('paymentMethodsContainer').innerHTML = `
                    <p style="color: #dc3545;">Ошибка подключения к серверу</p>
                `;
            }
        }

        function renderPaymentMethods() {
            const container = document.getElementById('paymentMethodsContainer');
            
            if (paymentMethods.length === 0) {
                container.innerHTML = '<p style="color: #666;">Способы оплаты не доступны</p>';
                return;
            }

            let html = '';
            paymentMethods.forEach((method, index) => {
                html += `
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <input type="radio" 
                               id="payment_${method.id}" 
                               name="payment_method" 
                               value="${method.id}"
                               ${index === 0 ? 'checked' : ''}
                               required
                               style="width: 20px; height: 20px;">
                        <label for="payment_${method.id}" style="margin: 0; cursor: pointer; font-weight: normal;">
                            ${escapeHtml(method.name)}
                        </label>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        document.getElementById('applicationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const courseName = document.getElementById('course_name').value.trim();
            const startDate = document.getElementById('desired_start_date').value;
            const paymentMethod = document.querySelector('input[name="payment_method"]:checked');

            if (!courseName || courseName.length < 1 || courseName.length > 200) {
                showAlert('Укажите наименование курса (от 1 до 200 символов)', 'error');
                return;
            }

            if (!startDate) {
                showAlert('Укажите дату начала обучения', 'error');
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const selectedDate = new Date(startDate);
            if (selectedDate < today) {
                showAlert('Дата начала не может быть в прошлом', 'error');
                return;
            }

            if (!paymentMethod && paymentMethods.length > 0) {
                showAlert('Выберите способ оплаты', 'error');
                return;
            }

            const formData = {
                course_name: courseName,
                desired_start_date: startDate,
                payment_method_id: parseInt(paymentMethod.value)
            };

            const token = localStorage.getItem('access_token');

            try {
                const response = await fetch('/api/applications', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Заявка успешно создана!', 'success');
                    setTimeout(() => {
                        window.location.href = '/my-applications';
                    }, 1500);
                } else {
                    showAlert(data.detail || 'Ошибка при создании заявки', 'error');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу', 'error');
            }
        });

        function showAlert(message, type) {
            if (window.notifications) {
                window.notifications[type](message);
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
