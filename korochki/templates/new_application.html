<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка - Корочки.есть</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .nav {
            display: flex;
            gap: 20px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .nav a:hover {
            background-color: #4CAF50;
        }
        .nav a.active {
            background-color: #4CAF50;
        }
        .main-content {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.2);
        }
        .radio-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            padding: 10px 0;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .radio-option label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: normal;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-submit:hover {
            background-color: #45a049;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            font-size: 14px;
            border: 1px solid #f5c6cb;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            font-size: 14px;
            border: 1px solid #c3e6cb;
        }
        .info-text {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
        .info-text a {
            color: #4CAF50;
            text-decoration: none;
        }
        .info-text a:hover {
            text-decoration: underline;
        }
        .error-field {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .error-field.show {
            display: block;
        }
        input.error,
        select.error {
            border-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">Корочки.есть</div>
            <div class="nav">
                <a href="/my-applications">Мои заявки</a>
                <a href="/new-application" class="active">Новая заявка</a>
                <a href="#" onclick="logout()">Выход</a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <h1>Создание новой заявки на обучение</h1>
            
            <div id="alert"></div>
            
            <form id="applicationForm">
                <div class="form-group">
                    <label for="course_name">Наименование курса *</label>
                    <input type="text" 
                           id="course_name" 
                           name="course_name" 
                           required
                           placeholder="Введите название курса"
                           minlength="1"
                           maxlength="200">
                    <div class="error-field" id="course_nameError">
                        Укажите наименование курса (от 1 до 200 символов)
                    </div>
                </div>

                <div class="form-group">
                    <label for="desired_start_date">Желаемая дата начала обучения *</label>
                    <input type="date" 
                           id="desired_start_date" 
                           name="desired_start_date" 
                           required>
                    <div class="error-field" id="desired_start_dateError">
                        Дата начала не может быть в прошлом
                    </div>
                </div>

                <div class="form-group">
                    <label>Способ оплаты *</label>
                    <div class="radio-group" id="paymentMethodsContainer">
                        <p style="color: #666;">Загрузка способов оплаты...</p>
                    </div>
                    <div class="error-field" id="payment_methodError">
                        Выберите способ оплаты
                    </div>
                </div>

                <button type="submit" class="btn-submit">Отправить заявку</button>
            </form>

            <div class="info-text">
                <a href="/my-applications">&larr; Вернуться к списку моих заявок</a>
            </div>
        </div>
    </div>

    <script>
        let paymentMethods = [];

        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            await loadPaymentMethods(token);
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('desired_start_date').setAttribute('min', today);
        });

        async function loadPaymentMethods(token) {
            try {
                const response = await fetch('/api/payment-methods');
                
                if (response.ok) {
                    paymentMethods = await response.json();
                    renderPaymentMethods();
                } else {
                    document.getElementById('paymentMethodsContainer').innerHTML = `
                        <p style="color: #f44336;">Ошибка загрузки способов оплаты</p>
                    `;
                }
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('paymentMethodsContainer').innerHTML = `
                    <p style="color: #f44336;">Ошибка подключения к серверу</p>
                `;
            }
        }

        function renderPaymentMethods() {
            const container = document.getElementById('paymentMethodsContainer');
            
            if (paymentMethods.length === 0) {
                container.innerHTML = '<p style="color: #666;">Способы оплаты не доступны</p>';
                return;
            }

            let html = '';
            paymentMethods.forEach((method, index) => {
                html += `
                    <div class="radio-option">
                        <input type="radio" 
                               id="payment_${method.id}" 
                               name="payment_method" 
                               value="${method.id}"
                               ${index === 0 ? 'checked' : ''}
                               required>
                        <label for="payment_${method.id}">
                            ${escapeHtml(method.name)}
                        </label>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        document.getElementById('applicationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            document.querySelectorAll('.error-field').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('input, select').forEach(el => el.classList.remove('error'));
            
            const courseName = document.getElementById('course_name').value.trim();
            const startDate = document.getElementById('desired_start_date').value;
            const paymentMethod = document.querySelector('input[name="payment_method"]:checked');
            
            let hasErrors = false;
            
            if (!courseName || courseName.length < 1 || courseName.length > 200) {
                document.getElementById('course_name').classList.add('error');
                document.getElementById('course_nameError').classList.add('show');
                hasErrors = true;
            }
            
            if (!startDate) {
                document.getElementById('desired_start_date').classList.add('error');
                document.getElementById('desired_start_dateError').classList.add('show');
                hasErrors = true;
            } else {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const selectedDate = new Date(startDate);
                
                if (selectedDate < today) {
                    document.getElementById('desired_start_date').classList.add('error');
                    document.getElementById('desired_start_dateError').classList.add('show');
                    hasErrors = true;
                }
            }
            
            if (!paymentMethod && paymentMethods.length > 0) {
                document.getElementById('payment_methodError').classList.add('show');
                hasErrors = true;
            }
            
            if (hasErrors) {
                showAlert('Исправьте ошибки в форме', 'error');
                return;
            }
            
            const formData = {
                course_name: courseName,
                desired_start_date: startDate,
                payment_method_id: parseInt(paymentMethod.value)
            };
            
            const token = localStorage.getItem('access_token');
            
            try {
                const response = await fetch('/api/applications', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Заявка успешно создана!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/my-applications';
                    }, 1500);
                } else {
                    showAlert(data.detail || 'Ошибка при создании заявки', 'error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка подключения к серверу', 'error');
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = type === 'success' ? 'success-message' : 'error-message';
            alert.textContent = message;
            alert.style.display = 'block';

            if (type === 'error') {
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 5000);
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
