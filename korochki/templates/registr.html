<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Корочки.есть</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .auth-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .auth-header p {
            color: #666;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 576px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
            <p>Создайте аккаунт для доступа к системе</p>
        </div>

        <div id="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="login"><i class="fas fa-user"></i> Логин *</label>
                <input type="text" 
                       id="login" 
                       name="login" 
                       class="form-control"
                       required 
                       minlength="3"
                       maxlength="50"
                       placeholder="Только латиница и цифры">
                <div class="error-message" id="loginError">
                    Логин должен содержать от 3 до 50 символов (только латиница и цифры)
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Пароль *</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control"
                           required 
                           minlength="6"
                           placeholder="Минимум 6 символов">
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-lock"></i> Подтверждение пароля *</label>
                    <input type="password" 
                           id="confirm_password" 
                           name="confirm_password" 
                           class="form-control"
                           required 
                           minlength="6"
                           placeholder="Повторите пароль">
                    <div class="error-message" id="confirm_passwordError">
                        Пароли не совпадают
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="full_name"><i class="fas fa-user-tag"></i> ФИО *</label>
                <input type="text" 
                       id="full_name" 
                       name="full_name" 
                       class="form-control"
                       required 
                       maxlength="100"
                       placeholder="Иванов Иван Иванович">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Телефон *</label>
                    <input type="tel" 
                           id="phone" 
                           name="phone" 
                           class="form-control"
                           required 
                           maxlength="20"
                           placeholder="(XXX)XXX-XX-XX">
                    <div class="error-message" id="phoneError">
                        Телефон должен быть в формате (XXX)XXX-XX-XX
                    </div>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           class="form-control"
                           required 
                           maxlength="100"
                           placeholder="example@mail.ru">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>

        <div class="auth-footer">
            <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
            <p><a href="/">← Вернуться на главную</a></p>
        </div>
    </div>

    <script src="/static/js/notifications.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.form-control').forEach(el => el.classList.remove('error'));

            const formData = {
                login: document.getElementById('login').value,
                password: document.getElementById('password').value,
                confirm_password: document.getElementById('confirm_password').value,
                full_name: document.getElementById('full_name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                role: 'user'
            };

            let hasErrors = false;

            const loginRegex = /^[a-zA-Z0-9]+$/;
            if (!loginRegex.test(formData.login)) {
                document.getElementById('login').classList.add('error');
                document.getElementById('loginError').classList.add('show');
                hasErrors = true;
            }

            if (formData.password !== formData.confirm_password) {
                document.getElementById('confirm_password').classList.add('error');
                document.getElementById('confirm_passwordError').classList.add('show');
                hasErrors = true;
            }

            const phoneRegex = /^\(\d{3}\)\d{3}-\d{2}-\d{2}$/;
            if (!phoneRegex.test(formData.phone)) {
                document.getElementById('phone').classList.add('error');
                document.getElementById('phoneError').classList.add('show');
                hasErrors = true;
            }

            if (hasErrors) {
                if (window.notifications) {
                    window.notifications.error('Исправьте ошибки в форме');
                }
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    if (window.notifications) {
                        window.notifications.success('Регистрация успешна! Перенаправление...');
                    }
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    if (window.notifications) {
                        window.notifications.error(data.detail || 'Ошибка регистрации');
                    }
                }
            } catch (error) {
                if (window.notifications) {
                    window.notifications.error('Ошибка подключения к серверу');
                }
            }
        });
    </script>
</body>
</html>
